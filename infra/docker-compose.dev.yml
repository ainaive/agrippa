# Development dependencies only — api/worker/web run on the host via `bun dev`.
# Usage: docker compose -f infra/docker-compose.dev.yml up -d
services:
  postgres:
    image: postgres:17
    environment:
      POSTGRES_USER: agrippa
      POSTGRES_PASSWORD: agrippa
      POSTGRES_DB: agrippa
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agrippa"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7
    ports:
      - "6379:6379"

volumes:
  pgdata:
