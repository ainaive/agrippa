name: CI

on:
  push:
    branches: [main, "feat/**", "fix/**", "infra/**", "upgrade/**"]
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: agrippa_test
        ports:
          - "5432:5432"
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
      redis:
        image: redis:7
        ports:
          - "6379:6379"
    env:
      TEST_DATABASE_URL: postgres://postgres:postgres@localhost:5432/agrippa_test
      REDIS_URL: redis://localhost:6379
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install
        run: bun install --frozen-lockfile

      - name: Lint & format (biome)
        run: bunx biome ci .

      - name: Typecheck
        run: bunx tsc -b

      - name: Dependency direction
        run: bun scripts/check-deps.ts

      - name: Validate builtin templates
        run: bun scripts/validate-templates.ts

      - name: Commitlint (PR range)
        if: github.event_name == 'pull_request'
        run: bunx commitlint --from ${{ github.event.pull_request.base.sha }} --to ${{ github.event.pull_request.head.sha }}

      - name: Commitlint (pushed commit)
        if: github.event_name == 'push'
        run: bunx commitlint --last

      - name: Test
        run: bun test

      - name: Build
        run: bun run build

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build api image
        run: docker build -f infra/Dockerfile.api -t agrippa-api:ci .
      - name: Build worker image
        run: docker build -f infra/Dockerfile.worker -t agrippa-worker:ci .
