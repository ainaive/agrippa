name: CI

on:
  push:
    branches: [main, "feat/**", "fix/**", "infra/**", "upgrade/**"]
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install
        run: bun install --frozen-lockfile

      - name: Lint & format (biome)
        run: bunx biome ci .

      - name: Typecheck
        run: bunx tsc -b

      - name: Dependency direction
        run: bun scripts/check-deps.ts

      - name: Commitlint (PR range)
        if: github.event_name == 'pull_request'
        run: bunx commitlint --from ${{ github.event.pull_request.base.sha }} --to ${{ github.event.pull_request.head.sha }}

      - name: Commitlint (pushed commit)
        if: github.event_name == 'push'
        run: bunx commitlint --last

      - name: Test
        run: bun test

      - name: Build
        run: bun run build
