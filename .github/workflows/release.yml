name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: read
  packages: write

jobs:
  images:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push api image
        run: |
          docker build -f infra/Dockerfile.api \
            -t ghcr.io/${{ github.repository_owner }}/agrippa-api:${{ github.ref_name }} \
            -t ghcr.io/${{ github.repository_owner }}/agrippa-api:latest .
          docker push --all-tags ghcr.io/${{ github.repository_owner }}/agrippa-api

      - name: Build and push worker image
        run: |
          docker build -f infra/Dockerfile.worker \
            -t ghcr.io/${{ github.repository_owner }}/agrippa-worker:${{ github.ref_name }} \
            -t ghcr.io/${{ github.repository_owner }}/agrippa-worker:latest .
          docker push --all-tags ghcr.io/${{ github.repository_owner }}/agrippa-worker
